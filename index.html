<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BRUTUSMAQ - Estoque Motor e Redutor</title>
<style>
:root{--bg:#f3f6f8;--panel:#fff;--ink:#17202a;--muted:#667085;--line:#d9e1e8;--brand:#0f766e;--blue:#1d4ed8;--amber:#b45309;--red:#b91c1c;--green:#15803d;--shadow:0 12px 28px rgba(17,24,39,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:15px;letter-spacing:0}button,input,select{font:inherit}button{cursor:pointer;border:0}.top{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border:1px solid var(--line);border-radius:8px;display:grid;place-items:center;background:#f8fafc;color:var(--brand)}.logo svg{width:36px;height:36px}.brand h1{margin:0;font-size:21px;line-height:1.1;text-transform:uppercase}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{min-height:38px;border-radius:6px;padding:0 12px;background:#eef2f7;border:1px solid #d8e0ea;color:var(--ink);display:inline-flex;align-items:center;gap:7px}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.danger{background:var(--red);border-color:var(--red);color:#fff}.wrap{width:min(1500px,100%);margin:0 auto;padding:18px;display:grid;grid-template-columns:280px minmax(0,1fr);gap:18px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}.title{margin:0;padding:14px 16px;background:#fbfcfd;border-bottom:1px solid var(--line);font-size:13px;text-transform:uppercase;color:#344054}.summary{display:grid;gap:1px;background:var(--line)}.metric{background:#fff;padding:14px 16px;min-height:72px;display:flex;justify-content:space-between;align-items:center;gap:12px}.metric span{color:var(--muted);font-size:13px}.metric strong{font-size:26px}.metric.total strong{color:var(--brand)}.metric.warn strong{color:var(--amber)}.legend{padding:14px 16px;background:#f8fafc;display:grid;gap:10px;border-top:1px solid var(--line);font-size:13px;color:#475467}.legend div{display:flex;align-items:center;gap:9px}.dot{width:10px;height:10px;border-radius:99px}.ok{background:var(--green)}.low{background:var(--amber)}.zero{background:var(--red)}.main{display:grid;gap:18px;min-width:0}.controls{padding:14px;display:grid;grid-template-columns:minmax(220px,1fr) auto auto;gap:10px;border-bottom:1px solid var(--line)}.search{position:relative}.search input,.controls select,.move input,.move select{height:40px;border:1px solid #b8c3cf;border-radius:6px;background:#fff;padding:0 10px;color:var(--ink);width:100%}.search input{padding-left:36px}.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#667085}.tabs{display:grid;grid-template-columns:repeat(3,1fr);min-width:260px;border:1px solid #b8c3cf;border-radius:6px;overflow:hidden}.tabs button{height:40px;background:#fff;color:#475467;border-right:1px solid var(--line);padding:0 12px}.tabs button:last-child{border-right:0}.tabs button.active{background:#17202a;color:#fff}.tablebox{overflow:auto}table{width:100%;min-width:860px;border-collapse:collapse}th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}th{height:44px;background:#f2f5f8;color:#344054;font-size:12px;text-transform:uppercase;white-space:nowrap}tbody tr:hover{background:#f8fafc}.item{display:flex;align-items:center;gap:10px;font-weight:700}.ico{width:34px;height:34px;border:1px solid var(--line);border-radius:6px;display:grid;place-items:center;background:#f9fafb;color:#475467}.pill{display:inline-flex;align-items:center;min-height:26px;border-radius:99px;padding:0 10px;font-size:12px;font-weight:700;border:1px solid transparent;white-space:nowrap}.motor{background:#e0f2fe;color:#075985;border-color:#bae6fd}.redutor{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe}.st-ok{background:#dcfce7;color:#166534;border-color:#bbf7d0}.st-low{background:#fef3c7;color:#92400e;border-color:#fde68a}.st-zero{background:#fee2e2;color:#991b1b;border-color:#fecaca}.qty{display:grid;grid-template-columns:34px 76px 34px;gap:6px;width:156px}.qty button{height:34px;border:1px solid #b8c3cf;background:#fff;border-radius:6px;font-weight:700}.qty input{height:34px;width:76px;border:1px solid #b8c3cf;border-radius:6px;text-align:center;font-weight:700}.date{color:var(--muted);font-size:13px;min-width:118px}.move{padding:14px;display:grid;grid-template-columns:1.3fr .8fr .8fr 1fr auto;gap:10px;border-bottom:1px solid var(--line);align-items:end}.field{display:grid;gap:6px}.field label{font-size:12px;text-transform:uppercase;color:#475467;font-weight:700}.history{padding:0 14px;max-height:235px;overflow:auto}.row{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.row b{display:block}.row small{color:var(--muted)}.h-entrada{color:var(--green)}.h-saida{color:var(--red)}.h-ajuste{color:var(--blue)}.empty{padding:16px 14px;color:var(--muted)}.toast{position:fixed;right:18px;bottom:18px;display:none;align-items:center;min-height:42px;background:#17202a;color:#fff;border-radius:6px;padding:0 14px;box-shadow:var(--shadow);z-index:10}.toast.show{display:flex}svg{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}@media(max-width:980px){.wrap{grid-template-columns:1fr}.controls{grid-template-columns:1fr}.tabs{min-width:0}.move{grid-template-columns:1fr 1fr}}@media(max-width:680px){.top{align-items:flex-start;flex-direction:column}.actions{width:100%}.btn{flex:1 1 auto}.brand h1{font-size:18px}.wrap{padding:12px}.move{grid-template-columns:1fr}}@media print{.top,.side,.controls,.move,.history-panel,.toast{display:none!important}.wrap{display:block;padding:0}.panel{box-shadow:none;border:0}table{min-width:0}.qty{grid-template-columns:76px}.qty button{display:none}}
</style>
</head>
<body>
<header class="top">
  <div class="brand"><div class="logo" aria-hidden="true"><svg viewBox="0 0 64 64"><rect x="8" y="20" width="28" height="22" rx="4"></rect><path d="M36 27h8l5 5-5 5h-8"></path><circle cx="48" cy="32" r="8"></circle><path d="M48 24v4M48 36v4M40 32h4M52 32h4M14 42v6M30 42v6M12 16h20"></path></svg></div><div><h1>ESTOQUE MOTOR E REDUTOR</h1><p id="savedAt">Controle operacional</p></div></div>
  <div class="actions"><button class="btn primary" id="saveBtn">Salvar</button><button class="btn" id="csvBtn">CSV</button><button class="btn" id="printBtn">Imprimir</button><button class="btn danger" id="clearBtn">Zerar</button></div>
</header>
<main class="wrap">
  <aside class="panel side"><h2 class="title">Resumo</h2><div class="summary"><div class="metric total"><span>Total em estoque</span><strong id="total">0</strong></div><div class="metric"><span>Motores</span><strong id="motors">0</strong></div><div class="metric"><span>Redutores</span><strong id="reducers">0</strong></div><div class="metric warn"><span>Baixo ou zerado</span><strong id="risk">14</strong></div></div><div class="legend"><div><i class="dot ok"></i>Estoque adequado</div><div><i class="dot low"></i>Estoque baixo</div><div><i class="dot zero"></i>Sem estoque</div></div></aside>
  <section class="main">
    <div class="panel"><div class="controls"><div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg><input id="q" type="search" placeholder="Buscar item, tipo ou potência"></div><div class="tabs"><button class="active" data-filter="todos">Todos</button><button data-filter="motor">Motores</button><button data-filter="redutor">Redutores</button></div><select id="sort"><option value="default">Ordem padrão</option><option value="qty-desc">Maior quantidade</option><option value="qty-asc">Menor quantidade</option><option value="power-asc">Menor CV</option><option value="power-desc">Maior CV</option></select></div><div class="tablebox"><table><thead><tr><th>Item</th><th>Tipo</th><th>Potência</th><th>Quantidade em estoque</th><th>Status</th><th>Última atualização</th></tr></thead><tbody id="body"></tbody></table></div></div>
    <div class="panel history-panel"><h2 class="title">Movimentação</h2><form class="move" id="moveForm"><div class="field"><label>Item</label><select id="moveItem"></select></div><div class="field"><label>Tipo</label><select id="moveType"><option value="entrada">Entrada</option><option value="saida">Saída</option><option value="ajuste">Ajuste</option></select></div><div class="field"><label>Quantidade</label><input id="moveQty" type="number" min="0" step="1" value="1"></div><div class="field"><label>Responsável</label><input id="moveBy" type="text" placeholder="Nome"></div><button class="btn primary" type="submit">Registrar</button></form><div class="history" id="history"></div></div>
  </section>
</main>
<div class="toast" id="toast"></div>
<script>
const key='brutusmaq_estoque_v1',hkey='brutusmaq_historico_v1',skey='brutusmaq_salvo_v1';
const base=[15,20,25,30,50,75,100].flatMap(cv=>[{id:'motor-'+cv,type:'motor',label:'MOTOR '+cv+'CV',power:cv,qty:0,updated:''},{id:'redutor-'+cv,type:'redutor',label:'REDUTOR '+cv+'CV',power:cv,qty:0,updated:''}]);
let items=loadItems(),history=loadHistory(),filter='todos';
const $=id=>document.getElementById(id),body=$('body'),q=$('q'),sort=$('sort'),toast=$('toast');
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()});
$('saveBtn').onclick=()=>{save();msg('Estoque salvo')};$('csvBtn').onclick=csv;$('printBtn').onclick=()=>print();$('clearBtn').onclick=clearAll;q.oninput=render;sort.onchange=render;
$('moveForm').onsubmit=e=>{e.preventDefault();const item=items.find(x=>x.id===$('moveItem').value),n=parseInt($('moveQty').value,10);if(!item||isNaN(n)||n<0)return;const before=item.qty,type=$('moveType').value;if(type==='entrada')item.qty+=n;if(type==='saida')item.qty=Math.max(0,item.qty-n);if(type==='ajuste')item.qty=n;item.updated=new Date().toISOString();addHistory(item,type,n,before,item.qty,$('moveBy').value.trim());$('moveQty').value=1;save();render();msg('Movimentação registrada')};
render();
function loadItems(){try{const saved=JSON.parse(localStorage.getItem(key)||'[]');return base.map(b=>{const m=saved.find(s=>s.id===b.id);return {...b,qty:Math.max(0,parseInt(m?.qty??0,10)||0),updated:m?.updated||''}})}catch{return base.map(x=>({...x}))}}
function loadHistory(){try{return JSON.parse(localStorage.getItem(hkey)||'[]')}catch{return[]}}
function save(){localStorage.setItem(key,JSON.stringify(items));localStorage.setItem(hkey,JSON.stringify(history));localStorage.setItem(skey,new Date().toISOString());savedAt()}
function render(){renderTable();renderOptions();renderSummary();renderHistory();savedAt()}
function renderTable(){let list=items.filter(x=>filter==='todos'||x.type===filter);const s=norm(q.value);if(s)list=list.filter(x=>norm(x.label+' '+x.type+' '+x.power+'cv').includes(s));list=sortList(list);body.innerHTML=list.map(row).join('');body.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>{const it=items.find(x=>x.id===b.dataset.id);if(it)updateQty(it,b.dataset.act==='plus'?it.qty+1:Math.max(0,it.qty-1))});body.querySelectorAll('input[data-id]').forEach(i=>i.onchange=()=>{const it=items.find(x=>x.id===i.dataset.id);if(it)updateQty(it,Math.max(0,parseInt(i.value,10)||0))})}
function row(x){const st=status(x.qty);return `<tr><td><div class="item"><span class="ico">${x.type==='motor'?motorIcon():reducerIcon()}</span>${x.label}</div></td><td><span class="pill ${x.type}">${x.type==='motor'?'Motor':'Redutor'}</span></td><td>${x.power}CV</td><td><div class="qty"><button data-act="minus" data-id="${x.id}">-</button><input data-id="${x.id}" type="number" min="0" value="${x.qty}"><button data-act="plus" data-id="${x.id}">+</button></div></td><td><span class="pill ${st.cls}">${st.label}</span></td><td class="date">${date(x.updated)}</td></tr>`}
function renderOptions(){const current=$('moveItem').value;$('moveItem').innerHTML=items.map(x=>`<option value="${x.id}">${x.label}</option>`).join('');if(items.some(x=>x.id===current))$('moveItem').value=current}
function renderSummary(){const total=sum(items),mot=sum(items.filter(x=>x.type==='motor')),red=sum(items.filter(x=>x.type==='redutor'));$('total').textContent=total;$('motors').textContent=mot;$('reducers').textContent=red;$('risk').textContent=items.filter(x=>x.qty<=2).length}
function renderHistory(){const h=$('history');if(!history.length){h.innerHTML='<div class="empty">Nenhuma movimentação registrada.</div>';return}h.innerHTML=history.slice(0,12).map(x=>`<div class="row"><div><b>${esc(x.label)}</b><small>${date(x.at)} - ${x.before} para ${x.after}${x.by?' - '+esc(x.by):''}</small></div><b class="h-${x.type}">${x.type==='entrada'?'+':x.type==='saida'?'-':'='}${x.amount}</b></div>`).join('')}
function updateQty(item,next){const before=item.qty;item.qty=next;item.updated=new Date().toISOString();addHistory(item,'ajuste',next,before,next,'');save();render()}
function addHistory(item,type,amount,before,after,by){history.unshift({id:String(Date.now())+Math.random(),label:item.label,type,amount,before,after,by,at:new Date().toISOString()});history=history.slice(0,80)}
function clearAll(){if(!confirm('Zerar todas as quantidades e limpar histórico?'))return;items=base.map(x=>({...x}));history=[];save();render();msg('Estoque zerado')}
function csv(){const rows=[['ITEM','TIPO','POTENCIA','QUANTIDADE EM ESTOQUE','STATUS','ULTIMA ATUALIZACAO'],...items.map(x=>[x.label,x.type.toUpperCase(),x.power+'CV',x.qty,status(x.qty).label,date(x.updated)])];const blob=new Blob(['\ufeff'+rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';')).join('\n')],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='estoque_motor_redutor.csv';a.click();URL.revokeObjectURL(a.href);msg('CSV gerado')}
function sortList(a){a=[...a];if(sort.value==='qty-desc')a.sort((x,y)=>y.qty-x.qty||x.power-y.power);if(sort.value==='qty-asc')a.sort((x,y)=>x.qty-y.qty||x.power-y.power);if(sort.value==='power-asc')a.sort((x,y)=>x.power-y.power||x.type.localeCompare(y.type));if(sort.value==='power-desc')a.sort((x,y)=>y.power-x.power||x.type.localeCompare(y.type));return a}
function status(n){if(n===0)return{label:'Sem estoque',cls:'st-zero'};if(n<=2)return{label:'Baixo',cls:'st-low'};return{label:'Adequado',cls:'st-ok'}}
function sum(a){return a.reduce((t,x)=>t+x.qty,0)}function norm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}function date(v){return v?new Intl.DateTimeFormat('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(v)):'Sem registro'}
function savedAt(){const v=localStorage.getItem(skey);$('savedAt').textContent=v?'Salvo em '+date(v):'Controle operacional'}function msg(t){toast.textContent=t;toast.classList.add('show');clearTimeout(msg.t);msg.t=setTimeout(()=>toast.classList.remove('show'),2200)}function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function motorIcon(){return '<svg width="20" height="20" viewBox="0 0 24 24"><rect x="3" y="8" width="12" height="8" rx="2"></rect><path d="M15 10h3l3 2-3 2h-3M6 16v3M12 16v3M6 5h6M8 5v3"></path></svg>'}
function reducerIcon(){return '<svg width="20" height="20" viewBox="0 0 24 24"><circle cx="9" cy="12" r="5"></circle><circle cx="16" cy="12" r="3"></circle><path d="M9 7v3M9 14v3M4 12h3M11 12h3M18 12h3"></path></svg>'}
</script>
</body>
</html>
